input_epubs: []
schema_paths:
  - schemas/characters.yaml
  - schemas/world.yaml
prompt_templates:
  - prompts/base.md
  - prompts/retry_format.md
  - prompts/retry_schema.md
workspace_root: workspace
concurrency:
  enable_parallel_tasks: true
  task_unit: epub_schema
  max_workers: 4
model:
  provider: openai
  name: gpt-4.1
  streaming: true
  base_url: https://api.openai.com/v1
  api_key: <KEY>
runtime:
  resume: true
  retry_count: 3
  retry_backoff_seconds: 3
progress:
  emit_console_progress: true
batching:
  enable_multi_chapter: true
  max_input_tokens: 12000
  prompt_overhead_tokens: 1500
  reserve_output_tokens: 3000
  allow_oversize_single_chapter: true
  split_on_failure: true
  split_after_retry_exhausted: true
  enable_checkpoint: false
  checkpoint_every_n_chapters: 10
# 黑名单关键字列表：如果LLM输出包含这些关键字，则视为错误并触发重试
blacklist_keywords: []
# blacklist_keywords:
#   - "抱歉"
#   - "我无法"
#   - "作为AI"

# 智能数组合并配置
merge:
  similarity_threshold: 0.6  # 相似度阈值，范围0.0-1.0
  # 字段权重配置：key为字段路径（支持嵌套路径用点号分隔），value为权重（默认为1.0）
  # 权重越高，该字段对整体相似度的影响越大
  field_weights: {}
  # field_weights:
  #   name: 2.0           # name字段权重为2.0
  #   title: 1.5          # title字段权重为1.5
  #   person.name: 3.0    # 嵌套字段权重
